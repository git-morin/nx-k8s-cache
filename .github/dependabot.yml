version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      all:
        patterns: ["*"]

  - package-ecosystem: gomod
    directory: /e2e
    schedule:
      interval: weekly
    groups:
      all:
        patterns: ["*"]
    ignore:
      - dependency-name: "k8s.io/*"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      all:
        patterns: ["*"]
