name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'src/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Dockerfile'
              - '.github/workflows/**'
            e2e:
              - 'e2e/**'
              - 'deploy/helm/**'
              - 'Dockerfile'
              - 'Dockerfile.runner'
              - '.github/workflows/**'

  unit:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest

    env:
      NX_CACHE_TOKEN: ci-test-token

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Create test Nx workspace
        run: |
          mkdir test-workspace

          cat > test-workspace/package.json << 'EOF'
          {
            "name": "test-workspace",
            "devDependencies": {
              "nx": "^20.8.0"
            }
          }
          EOF

          cat > test-workspace/nx.json << 'EOF'
          {
            "targetDefaults": {
              "build": {
                "cache": true
              }
            }
          }
          EOF

          mkdir -p test-workspace/apps/myapp

          cat > test-workspace/apps/myapp/project.json << 'EOF'
          {
            "name": "myapp",
            "targets": {
              "build": {
                "executor": "nx:run-commands",
                "outputs": ["{projectRoot}/dist"],
                "options": {
                  "command": "mkdir -p apps/myapp/dist && echo built > apps/myapp/dist/output.txt"
                },
                "cache": true
              }
            }
          }
          EOF

          cd test-workspace && npm install

      - name: Start cache server
        run: |
          mkdir -p /tmp/nx-cache
          NX_CACHE_DIR=/tmp/nx-cache NX_CACHE_TOKEN=$NX_CACHE_TOKEN \
            ./target/release/nx-cache-server &
          echo "CACHE_SERVER_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/healthz && break
            [ $i -eq 30 ] && { echo "Cache server failed to start"; exit 1; }
            sleep 1
          done

      - name: First build (populate remote cache)
        working-directory: test-workspace
        env:
          NX_SELF_HOSTED_REMOTE_CACHE_SERVER: http://localhost:8080
          NX_SELF_HOSTED_REMOTE_CACHE_ACCESS_TOKEN: ${{ env.NX_CACHE_TOKEN }}
          NX_DAEMON: "false"
        run: npx nx build myapp

      - name: Verify cache entry was stored
        run: |
          count=$(ls /tmp/nx-cache | wc -l)
          echo "Remote cache entries: $count"
          [ "$count" -gt 0 ] || { echo "ERROR: nothing was stored in remote cache"; exit 1; }

      - name: Reset local cache and delete outputs
        working-directory: test-workspace
        run: |
          npx nx reset
          rm -rf apps/myapp/dist

      - name: Second build (restore from remote cache)
        working-directory: test-workspace
        env:
          NX_SELF_HOSTED_REMOTE_CACHE_SERVER: http://localhost:8080
          NX_SELF_HOSTED_REMOTE_CACHE_ACCESS_TOKEN: ${{ env.NX_CACHE_TOKEN }}
          NX_DAEMON: "false"
        run: |
          npx nx build myapp
          [ -f apps/myapp/dist/output.txt ] || { echo "ERROR: dist was not restored from remote cache"; exit 1; }

      - name: Stop cache server
        if: always()
        run: kill $CACHE_SERVER_PID 2>/dev/null || true

  e2e:
    needs: [changes, unit]
    if: always() && (needs.changes.outputs.rust == 'true' || needs.changes.outputs.e2e == 'true') && (needs.unit.result == 'success' || needs.unit.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-musl-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-musl-

      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Build Docker images
        run: |
          docker build -t nx-cache-server:ci .
          docker build -f Dockerfile.runner -t nx-runner:ci .

      - name: Pull busybox
        run: docker pull busybox:stable

      - uses: azure/setup-helm@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: e2e/go.mod

      - name: Run k8s e2e tests
        working-directory: e2e
        run: |
          go mod tidy
          go test ./... -v -count=1 -timeout 20m

  release:
    needs: [changes, unit, e2e]
    if: always() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && (needs.unit.result == 'success' || needs.unit.result == 'skipped') && (needs.e2e.result == 'success' || needs.e2e.result == 'skipped')
    runs-on: ubuntu-latest
    concurrency:
      group: semantic-release-${{ github.ref }}
      cancel-in-progress: false

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/exec
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
