name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: unit-test
    runs-on: ubuntu-latest

    env:
      NX_CACHE_TOKEN: ci-test-token

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build cache server
        run: cargo build --release

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create test Nx workspace
        run: |
          mkdir test-workspace

          cat > test-workspace/package.json << 'EOF'
          {
            "name": "test-workspace",
            "devDependencies": {
              "nx": "^20.8.0"
            }
          }
          EOF

          cat > test-workspace/nx.json << 'EOF'
          {
            "targetDefaults": {
              "build": {
                "cache": true
              }
            }
          }
          EOF

          mkdir -p test-workspace/apps/myapp

          cat > test-workspace/apps/myapp/project.json << 'EOF'
          {
            "name": "myapp",
            "targets": {
              "build": {
                "executor": "nx:run-commands",
                "outputs": ["{projectRoot}/dist"],
                "options": {
                  "command": "mkdir -p apps/myapp/dist && echo built > apps/myapp/dist/output.txt"
                },
                "cache": true
              }
            }
          }
          EOF

          cd test-workspace && npm install

      - name: Start cache server
        run: |
          mkdir -p /tmp/nx-cache
          NX_CACHE_DIR=/tmp/nx-cache NX_CACHE_TOKEN=$NX_CACHE_TOKEN \
            ./target/release/nx-cache-server &
          echo "CACHE_SERVER_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/healthz && break
            [ $i -eq 30 ] && { echo "Cache server failed to start"; exit 1; }
            sleep 1
          done

      - name: First build — populates remote cache
        working-directory: test-workspace
        env:
          NX_SELF_HOSTED_REMOTE_CACHE_SERVER: http://localhost:8080
          NX_SELF_HOSTED_REMOTE_CACHE_ACCESS_TOKEN: ${{ env.NX_CACHE_TOKEN }}
          NX_DAEMON: "false"
        run: npx nx build myapp

      - name: Verify entry was stored on server
        run: |
          count=$(ls /tmp/nx-cache | wc -l)
          echo "Remote cache entries: $count"
          [ "$count" -gt 0 ] || { echo "ERROR: nothing was stored in remote cache"; exit 1; }

      - name: Reset local cache and delete outputs
        working-directory: test-workspace
        run: |
          npx nx reset
          rm -rf apps/myapp/dist

      - name: Second build — should restore from remote cache
        working-directory: test-workspace
        env:
          NX_SELF_HOSTED_REMOTE_CACHE_SERVER: http://localhost:8080
          NX_SELF_HOSTED_REMOTE_CACHE_ACCESS_TOKEN: ${{ env.NX_CACHE_TOKEN }}
          NX_DAEMON: "false"
        run: |
          npx nx build myapp
          [ -f apps/myapp/dist/output.txt ] || { echo "ERROR: dist was not restored from remote cache"; exit 1; }

      - name: Stop cache server
        if: always()
        run: kill $CACHE_SERVER_PID 2>/dev/null || true

  e2e:
    name: e2e-test
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-musl-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-musl-

      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Build Docker image
        run: docker build -t nx-cache-server:ci .

      - name: Build runner image
        run: docker build -f Dockerfile.runner -t nx-runner:ci .

      - name: Pull busybox
        run: docker pull busybox:stable

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: e2e/go.mod

      - name: Run k8s tests
        working-directory: e2e
        run: |
          go mod tidy
          go test ./... -v -count=1 -timeout 20m

  publish:
    name: publish-image
    runs-on: ubuntu-latest
    needs: [unit, e2e]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-musl-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-musl-

      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/nx-k8s-cache
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
