name: E2E (In-Cluster)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # --- Build the cache server image ---

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-musl-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-musl-

      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Build Docker image
        run: docker build -t nx-cache-server:ci .

      # --- Run e2e tests (cluster lifecycle managed by the Go test) ---

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: e2e/go.sum

      - name: Run e2e tests
        working-directory: e2e
        run: |
          go mod tidy
          go test ./... -v -count=1 -timeout 20m
