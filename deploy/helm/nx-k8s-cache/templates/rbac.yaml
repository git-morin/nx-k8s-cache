{{- if and .Values.serviceAccount.create (eq .Values.security.level "paranoid") }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "nx-k8s-cache.fullname" . }}-tokenreview
  labels:
    {{- include "nx-k8s-cache.labels" . | nindent 4 }}
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "nx-k8s-cache.fullname" . }}-tokenreview
  labels:
    {{- include "nx-k8s-cache.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "nx-k8s-cache.fullname" . }}-tokenreview
subjects:
  - kind: ServiceAccount
    name: {{ include "nx-k8s-cache.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
