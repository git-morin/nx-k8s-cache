{{- $level := .Values.security.level }}
{{- if and (ne $level "open") (ne $level "paranoid") (not .Values.security.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nx-k8s-cache.fullname" . }}-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nx-k8s-cache.labels" . | nindent 4 }}
stringData:
  token: {{ required "security.token is required at standard and hardened levels unless security.existingSecret is set" .Values.security.token | quote }}
{{- end }}
