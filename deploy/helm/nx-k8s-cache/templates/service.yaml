apiVersion: v1
kind: Service
metadata:
  name: {{ include "nx-k8s-cache.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nx-k8s-cache.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "nx-k8s-cache.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      name: http
      protocol: TCP
